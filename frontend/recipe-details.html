<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Recipe Finder</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="profile.html">Create Profile</a>
        </nav>
    </header>

    <main class="details-container">
        <div id="recipe-content">
            <p>Loading your delicious recipe...</p>
        </div>

        <section class="reviews-section">
            <h3>Rate & Review</h3>
            <p>Tried this recipe? Let others know what you think!</p>
            
            <form id="reviewForm">
                <div class="form-group">
                    <label for="rating">Rating (1 to 5 stars):</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label for="reviewText">Your Review:</label>
                    <textarea id="reviewText" rows="4" required placeholder="What did you think of this recipe?"></textarea>
                </div>
                <button type="submit" id="submitReviewBtn">Submit Review</button>
            </form>

            <div id="reviews-list">
                <h4>Community Reviews</h4>
                </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/recipe-details.js"></script>
</body>
</html>
