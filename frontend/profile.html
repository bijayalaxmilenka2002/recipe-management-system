<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile - Recipe System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Recipe Finder</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="profile.html">Create Profile</a>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Create Your Cooking Profile</h2>
            <p>Tell us how you cook so we can personalize your recipes!</p>
            
            <form id="profileForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required placeholder="Enter a username">
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="dietary">Dietary Preference:</label>
                    <select id="dietary" name="dietary">
                        <option value="none">No specific diet</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="gluten-free">Gluten-Free</option>
                        <option value="keto">Keto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="allergies">Allergies / Ingredients to Avoid:</label>
                    <input type="text" id="allergies" name="allergies" placeholder="e.g., Peanuts, Shellfish, Dairy">
                </div>

                <div class="form-group">
                    <label for="skill">Cooking Skill Level:</label>
                    <select id="skill" name="skill">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>

                <button type="submit" id="saveProfileBtn">Save Profile</button>
            </form>
        </section>
    </main>

    <script src="js/profile.js"></script>
</body>
</html>
