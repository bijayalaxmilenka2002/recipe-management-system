<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Recipe Management</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body style="background-color: #f9f9f9; margin: 0;"> <nav style="padding: 20px; background: #333; text-align: center;">
        <a href="index.html" style="color: white; margin-right: 15px; text-decoration: none;">Home</a>
        <a href="login.html" style="color: white; text-decoration: none;">Login</a>
    </nav>
    
    <div class="auth-container">
        <h2>Create an Account</h2>
        <form id="registerForm" class="auth-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
