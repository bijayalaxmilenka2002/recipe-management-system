<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Recipe Finder</h1>
        <nav style="padding: 20px; background: #333; text-align: center; margin-bottom: 20px;">
            <a href="index.html" style="color: white; margin-right: 15px; text-decoration: none;">Home</a>
    
            <span id="guest-links">
                <a href="login.html" style="color: white; margin-right: 15px; text-decoration: none;">Login</a>
                <a href="register.html" style="color: white; text-decoration: none;">Register</a>
            </span>

            <span id="user-links" style="display: none;">
                <span id="welcome-message" style="color: #B42B4D; margin-right: 15px; font-weight: bold;"></span>
                <a href="profile.html" style="color: white; margin-right: 15px; text-decoration: none;">My Profile</a>
                <a href="#" id="logoutBtn" style="color: white; text-decoration: none;">Logout</a>
            </span>
        </nav>
    </header>

    <main>
        <section id="search-section" class="search-container">
            <h2>Discover New Meals</h2>
            <p>Find the perfect recipe based on what you crave!</p>
            
            <div class="filter-group">
                <input type="text" id="searchInput" placeholder="Search by ingredient or recipe name...">
                
                <select id="cuisineType">
                    <option value="">Any Cuisine</option>
                    <option value="italian">Italian</option>
                    <option value="indian">Indian</option>
                    <option value="mexican">Mexican</option>
                    <option value="chinese">Chinese</option>
                </select>

                <select id="mealType">
                    <option value="">Any Meal</option>
                    <option value="breakfast">Breakfast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>
                    <option value="snack">Snack</option>
                </select>

                <select id="dietaryFilter">
                    <option value="">Any Diet</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                    <option value="gluten-free">Gluten-Free</option>
                </select>

                <input type="number" id="maxTime" placeholder="Max time (mins)" min="5" max="300">
                
                <button id="searchBtn">Search Recipes</button>
            </div>
        </section>

        <section id="recipe-results" class="recipe-grid">
            </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
