<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recipe Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f9f9f9; margin: 0;">
    <nav style="padding: 20px; background: #333; text-align: center;">
        <a href="index.html" style="color: white; margin-right: 15px; text-decoration: none;">Home</a>
        <a href="register.html" style="color: white; text-decoration: none;">Register</a>
    </nav>
    
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <form id="loginForm" class="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
